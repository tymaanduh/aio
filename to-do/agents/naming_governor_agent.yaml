agent:
  id: naming-governor-agent
  display_name: Naming Governor Agent
  purpose: Enforce semantic names linked by Window_Page_Control_Module ownership.
  role: naming_governor
  controls_cap: 4
  allowed_controls:
  - governance.naming
  - governance.alias_sync
  - code.edit.naming_tokens
  - governance.refactor_gate
  startup_tools:
  - context_reader
  - code_search
  - code_edit
  - validator
  startup_tool_cap: 4
  access_policy_ref: source://agent_access_control#agents/naming-governor-agent
  tool_access_request:
    required_for_non_startup_tools: true
    request_command: npm run agent:request-access -- --agent-id <agent-id> --requested-tool <tool-id> --privilege-flag <flag-id>
      --reason "<why-needed>"
    request_log_file: source://request_log_file
    required_fields:
    - agent_id
    - requested_tool
    - privilege_flag
    - reason
  file_update_logging:
    required: true
    scan_on_start: true
    scan_on_finish: true
    watch_for_long_edit_passes: true
    events_file: source://update_events_file
    sessions_file: source://update_sessions_file
    scan_command: npm run updates:scan -- --actor naming-governor-agent --scope "<scope>"
    watch_command: npm run updates:watch -- --actor naming-governor-agent --session-id <session-id>
  skill_stack:
  - linked-naming-governor
  - pre-assign-naming-gate
  - dictionary-alias-sync
  - refactor-blocking-gate
  workflow:
  - Map ownership chain (window -> page -> control -> module) before naming.
  - Generate linked names for folder path, registry key, object path, and function scope.
  - Apply names in one pass with no deferred fixer cleanup.
  - Sync alias runtime/doc files when abbreviations are introduced or changed.
  - Run lint/test/refactor gate and block completion on failure.
  - Run npm run governance:hard:gate and stop on failures before completion.
  project_scope_ref: source://project_scope
  runtime_contract:
    brain_root: brain/
    data_input_root: data/input/
    data_output_root: data/output/
    todo_root: to-do/
    wrapper_execution_mode: two_pass_single_wrapper
    allowed_runtime_roots:
    - brain/
    - data/input/
    - data/output/
    - to-do/
    editable_project_roots:
    - app/
    - brain/
    - data/input/
    - data/output/
    - main/
    - renderer/
    - scripts/
    - tests/
    - to-do/
    no_external_targets: true
  blocking_checks:
  - Hard governance gate passes (npm run governance:hard:gate).
  scope_guardrails_ref: source://scope_guardrails#default
