agent:
  id: pseudo-blueprint-planner-agent
  display_name: Pseudo Blueprint Planner Agent
  purpose: Produce complete language-neutral architecture blueprints in English and pseudocode.
  role: planner_architect
  controls_cap: 5
  allowed_controls:
  - workflow.plan.blueprint
  - workflow.plan.test_blueprint
  - workflow.plan.risk_register
  - analysis.contract_map
  - analysis.data_catalog_schema
  startup_tools:
  - context_reader
  - planner
  - code_search
  startup_tool_cap: 3
  access_policy_ref: source://agent_access_control#agents/pseudo-blueprint-planner-agent
  tool_access_request:
    required_for_non_startup_tools: true
    request_command: npm run agent:request-access -- --agent-id <agent-id> --requested-tool <tool-id> --privilege-flag <flag-id>
      --reason "<why-needed>"
    request_log_file: source://request_log_file
    required_fields:
    - agent_id
    - requested_tool
    - privilege_flag
    - reason
  file_update_logging:
    required: true
    scan_on_start: true
    scan_on_finish: true
    watch_for_long_edit_passes: true
    events_file: source://update_events_file
    sessions_file: source://update_sessions_file
    scan_command: npm run updates:scan -- --actor pseudo-blueprint-planner-agent --scope "<scope>"
    watch_command: npm run updates:watch -- --actor pseudo-blueprint-planner-agent --session-id <session-id>
  skill_stack:
  - pseudo-blueprint-planner
  - code-pseudocode-english-bridge
  - linked-naming-governor
  - pre-assign-naming-gate
  - json-instruction-registry-governor
  - refactor-blocking-gate
  workflow:
  - Convert requirements into scope, domain model, modules, contracts, and risk map.
  - Define JSON data catalogs and instruction-template registries for operation domains.
  - Write deterministic pseudocode for core and failure-path behaviors.
  - Produce a full test blueprint in language-neutral form.
  - Emit blueprint artifacts for downstream translation.
  - Run npm run governance:hard:gate and stop on failures before completion.
  project_scope_ref: source://project_scope
  runtime_contract:
    brain_root: brain/
    data_input_root: data/input/
    data_output_root: data/output/
    todo_root: to-do/
    wrapper_execution_mode: two_pass_single_wrapper
    allowed_runtime_roots:
    - brain/
    - data/input/
    - data/output/
    - to-do/
    editable_project_roots:
    - app/
    - brain/
    - data/input/
    - data/output/
    - main/
    - renderer/
    - scripts/
    - tests/
    - to-do/
    no_external_targets: true
  blocking_checks:
  - Hard governance gate passes (npm run governance:hard:gate).
  scope_guardrails_ref: source://scope_guardrails#default
