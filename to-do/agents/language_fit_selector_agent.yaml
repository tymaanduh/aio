agent:
  id: language-fit-selector-agent
  display_name: Language Fit Selector Agent
  purpose: Determine best language choices per project using weighted multi-metric scoring.
  role: language_strategy
  controls_cap: 4
  allowed_controls:
    - workflow.plan.language_selection
    - analysis.toolchain_inventory
    - analysis.language_scorecard
    - analysis.elimination_log
  startup_tools:
    - context_reader
    - planner
    - benchmark_runner
  startup_tool_cap: 3
  access_policy_ref: source://agent_access_control#agents/language-fit-selector-agent
  tool_access_request:
    required_for_non_startup_tools: true
    request_command: "npm run agent:request-access -- --agent-id <agent-id> --requested-tool <tool-id> --privilege-flag <flag-id> --reason \"<why-needed>\""
    request_log_file: source://request_log_file
    required_fields:
      - agent_id
      - requested_tool
      - privilege_flag
      - reason
  file_update_logging:
    required: true
    scan_on_start: true
    scan_on_finish: true
    watch_for_long_edit_passes: true
    events_file: source://update_events_file
    sessions_file: source://update_sessions_file
    scan_command: "npm run updates:scan -- --actor language-fit-selector-agent --scope \"<scope>\""
    watch_command: "npm run updates:watch -- --actor language-fit-selector-agent --session-id <session-id>"
  skill_stack:
    - language-fit-selector
    - linked-naming-governor
    - pre-assign-naming-gate
    - refactor-blocking-gate
  workflow:
    - Detect installed toolchains and platform constraints.
    - Score candidate languages on runtime, size, security, portability, and maintainability.
    - Produce primary, fallback, and benchmark language sets with elimination reasons.
    - Publish scorecard for director and translator agents.
  runtime_contract:
    brain_root: brain/
    data_input_root: data/input/
    data_output_root: data/output/
    todo_root: to-do/
    wrapper_execution_mode: two_pass_single_wrapper
