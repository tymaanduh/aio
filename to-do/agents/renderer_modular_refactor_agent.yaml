agent:
  id: renderer-modular-refactor-agent
  display_name: Renderer Modular Refactor Agent
  purpose: Keep renderer orchestration-only and module domains dispatch-first.
  role: renderer_refactor
  controls_cap: 4
  allowed_controls:
    - code.edit.renderer
    - governance.dispatch
    - governance.naming
    - governance.refactor_gate
  startup_tools:
    - context_reader
    - code_search
    - code_edit
    - validator
  startup_tool_cap: 4
  access_policy_ref: source://agent_access_control#agents/renderer-modular-refactor-agent
  tool_access_request:
    required_for_non_startup_tools: true
    request_command: "npm run agent:request-access -- --agent-id <agent-id> --requested-tool <tool-id> --privilege-flag <flag-id> --reason \"<why-needed>\""
    request_log_file: source://request_log_file
    required_fields:
      - agent_id
      - requested_tool
      - privilege_flag
      - reason
  file_update_logging:
    required: true
    scan_on_start: true
    scan_on_finish: true
    watch_for_long_edit_passes: true
    events_file: source://update_events_file
    sessions_file: source://update_sessions_file
    scan_command: "npm run updates:scan -- --actor renderer-modular-refactor-agent --scope \"<scope>\""
    watch_command: "npm run updates:watch -- --actor renderer-modular-refactor-agent --session-id <session-id>"
  skill_stack:
    - linked-naming-governor
    - renderer-wrapper-modularizer
    - renderer-dispatch-cutover
    - strict-format-cleanup
    - refactor-blocking-gate
  workflow:
    - Select extraction slice by ownership chain and domain cohesion.
    - Move logic to module files using linked naming format.
    - Replace repeated wrappers with grouped dispatch object paths.
    - Align extracted module keys with group sets and dispatch specs in same pass.
    - Run lint/test/refactor gate and block completion on failure.
  runtime_contract:
    brain_root: brain/
    data_input_root: data/input/
    data_output_root: data/output/
    todo_root: to-do/
    wrapper_execution_mode: two_pass_single_wrapper
