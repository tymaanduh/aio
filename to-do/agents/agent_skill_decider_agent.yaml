agent:
  id: agent-skill-decider-agent
  display_name: Agent Skill Decider Agent
  purpose: Decide final edits from reviewer output and update SKILL.md/agent metadata with blocking validation.
  role: architecture_decider
  controls_cap: 6
  allowed_controls:
    - code.edit.skills
    - code.edit.agents
    - code.edit.rules
    - code.edit.routing
    - governance.access_policy
    - governance.instruction_policy_write
  startup_tools:
    - context_reader
    - code_search
    - code_edit
    - validator
  startup_tool_cap: 4
  access_policy_ref: source://agent_access_control#agents/agent-skill-decider-agent
  tool_access_request:
    required_for_non_startup_tools: true
    request_command: >-
      npm run agent:request-access -- --agent-id <agent-id> --requested-tool <tool-id> --privilege-flag <flag-id>
      --reason "<why-needed>"
    request_log_file: source://request_log_file
    required_fields:
      - agent_id
      - requested_tool
      - privilege_flag
      - reason
  file_update_logging:
    required: true
    scan_on_start: true
    scan_on_finish: true
    watch_for_long_edit_passes: true
    events_file: source://update_events_file
    sessions_file: source://update_sessions_file
    scan_command: npm run updates:scan -- --actor agent-skill-decider-agent --scope "<scope>"
    watch_command: npm run updates:watch -- --actor agent-skill-decider-agent --session-id <session-id>
  skill_stack:
    - agent-skill-decision-editor
    - json-instruction-registry-governor
    - linked-naming-governor
    - dictionary-alias-sync
    - strict-format-cleanup
    - refactor-blocking-gate
  workflow:
    - Validate reviewer decision packet fields and recommended alternative.
    - Apply final edits to skills, agent metadata, workflow, and routing files.
    - Enforce JSON source-of-truth and instruction-template dedupe for data/operation domains.
    - Enforce naming and alias sync when names/abbreviations change.
    - Run lint/test/refactor gate.
    - Publish final change summary and residual risk notes.
    - Run npm run governance:hard:gate and stop on failures before completion.
  project_scope_ref: source://project_scope
  scope_guardrails:
    - Edit only app/, brain/, data/input/, data/output/, main/, renderer/, scripts/, tests/, and to-do/.
    - Keep runtime in brain/*, catalogs/specs in data/input/*, and generated output in data/output/*.
    - "Preserve two-pass wrapper order: identify_arguments before execute_pipeline."
    - Run npm run governance:hard:gate after skill/agent/routing updates.
    - Run npm run standards:baseline:gate for naming, storage, and optimization policy enforcement.
    - Use data/input/shared/main/executive_engineering_baseline.json as the policy source for engineering decisions.
    - Run npm run agents:validate after metadata edits.
  runtime_contract:
    brain_root: brain/
    data_input_root: data/input/
    data_output_root: data/output/
    todo_root: to-do/
    wrapper_execution_mode: two_pass_single_wrapper
    allowed_runtime_roots:
      - brain/
      - data/input/
      - data/output/
      - to-do/
    editable_project_roots:
      - app/
      - brain/
      - data/input/
      - data/output/
      - main/
      - renderer/
      - scripts/
      - tests/
      - to-do/
    no_external_targets: true
  blocking_checks:
    - Hard governance gate passes (npm run governance:hard:gate).
