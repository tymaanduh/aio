agent:
  id: instruction-registry-governor-agent
  display_name: Instruction Registry Governor Agent
  purpose: Enforce JSON source-of-truth catalogs and instruction-template dedupe with 1:1 wrapper actions.
  role: instruction_registry_governor
  controls_cap: 5
  allowed_controls:
    - governance.json_source_of_truth
    - governance.instruction_template_dedupe
    - code.edit.data_catalogs
    - code.edit.wrapper_actions
    - governance.refactor_gate
  startup_tools:
    - context_reader
    - code_search
    - code_edit
    - validator
  startup_tool_cap: 4
  access_policy_ref: source://agent_access_control#agents/instruction-registry-governor-agent
  tool_access_request:
    required_for_non_startup_tools: true
    request_command: "npm run agent:request-access -- --agent-id <agent-id> --requested-tool <tool-id> --privilege-flag <flag-id> --reason \"<why-needed>\""
    request_log_file: source://request_log_file
    required_fields:
      - agent_id
      - requested_tool
      - privilege_flag
      - reason
  file_update_logging:
    required: true
    scan_on_start: true
    scan_on_finish: true
    watch_for_long_edit_passes: true
    events_file: source://update_events_file
    sessions_file: source://update_sessions_file
    scan_command: "npm run updates:scan -- --actor instruction-registry-governor-agent --scope \"<scope>\""
    watch_command: "npm run updates:watch -- --actor instruction-registry-governor-agent --session-id <session-id>"
  skill_stack:
    - json-instruction-registry-governor
    - linked-naming-governor
    - pre-assign-naming-gate
    - refactor-blocking-gate
  workflow:
    - Inventory hardcoded JS data walls and repeated instruction sets.
    - Extract domain data to JSON catalogs under data/input/shared/*.
    - Deduplicate repeated instruction sets via template refs.
    - Keep runtime wrapper functions as 1:1 action handlers.
    - Run lint/test/refactor gate.
  runtime_contract:
    brain_root: brain/
    data_input_root: data/input/
    data_output_root: data/output/
    todo_root: to-do/
    wrapper_execution_mode: two_pass_single_wrapper
