<!doctype html>
<html lang="en" data-theme="futuristic">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runtime Console</title>
    <style>
      :root {
        --bg: linear-gradient(180deg, #f4f8fd 0%, #edf3fb 100%);
        --surface: rgba(255, 255, 255, 0.92);
        --surface-2: #ffffff;
        --line: #cedbea;
        --line-soft: #dce6f1;
        --text: #162537;
        --muted: #5a6f87;
        --accent: #0f76de;
        --danger: #bf3854;
        --warn: #946722;
        --ok: #187f57;
        --overlay-shadow: 0 16px 38px rgba(15, 33, 56, 0.12);
      }

      :root[data-theme="enterprise"] {
        color-scheme: light;
      }

      :root[data-theme="futuristic"] {
        color-scheme: dark;
        --bg: linear-gradient(180deg, #09121e 0%, #060d16 100%);
        --surface: rgba(11, 20, 32, 0.9);
        --surface-2: rgba(13, 23, 37, 0.96);
        --line: #355072;
        --line-soft: #2a425f;
        --text: #e4f0ff;
        --muted: #91a8c4;
        --accent: #73bcff;
        --danger: #ff8ba2;
        --warn: #ffd28f;
        --ok: #63dfb0;
        --overlay-shadow: 0 18px 42px rgba(1, 5, 12, 0.58);
      }

      :root[data-theme="monochrome"] {
        color-scheme: light;
        --bg: linear-gradient(180deg, #f0f2f4 0%, #e8ebee 100%);
        --surface: rgba(249, 250, 252, 0.92);
        --surface-2: #ffffff;
        --line: #c7ced6;
        --line-soft: #d7dde3;
        --text: #1c2025;
        --muted: #616972;
        --accent: #4e5661;
        --danger: #7f4c54;
        --warn: #71643f;
        --ok: #4d5f52;
        --overlay-shadow: 0 15px 36px rgba(20, 24, 30, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--surface);
        backdrop-filter: blur(8px);
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      strong {
        letter-spacing: 0.01em;
      }

      .status {
        color: var(--muted);
        font-size: 0.83rem;
      }

      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      button {
        border: 1px solid var(--line);
        background: var(--surface-2);
        color: var(--text);
        border-radius: 9px;
        min-height: 32px;
        padding: 0 10px;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 600;
        transition:
          border-color 140ms ease,
          background-color 140ms ease,
          transform 140ms ease;
      }

      button:hover {
        border-color: color-mix(in oklab, var(--accent) 45%, var(--line));
        background: color-mix(in oklab, var(--accent) 11%, var(--surface-2));
      }

      button:active {
        transform: translateY(1px);
      }

      #logList {
        list-style: none;
        margin: 0;
        padding: 8px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      #logList::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      .logRow {
        border: 1px solid var(--line-soft);
        border-radius: 10px;
        padding: 8px;
        background: var(--surface-2);
        box-shadow: var(--overlay-shadow);
        display: grid;
        gap: 4px;
      }

      .meta {
        display: flex;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 0.71rem;
      }

      .level {
        text-transform: uppercase;
        letter-spacing: 0.07em;
        font-weight: 700;
      }

      .level-error {
        color: var(--danger);
      }

      .level-warn {
        color: var(--warn);
      }

      .level-info {
        color: var(--accent);
      }

      .level-debug {
        color: var(--ok);
      }

      .message {
        font-size: 0.84rem;
        color: var(--text);
      }

      .context {
        font-size: 0.75rem;
        color: var(--muted);
        white-space: pre-wrap;
      }

      body.motion-reduced * {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <strong>Dictionary Runtime Console</strong>
        <div id="status" class="status">Connecting...</div>
      </div>
      <div class="actions">
        <button id="toggleButton" type="button">Disable Logs</button>
        <button id="clearButton" type="button">Clear View</button>
      </div>
    </header>
    <ul id="logList"></ul>
    <script type="module" src="../windows/logs_window/window_shell.js"></script>
  </body>
</html>
