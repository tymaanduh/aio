agent:
  id: naming-governor-agent
  display_name: Naming Governor Agent
  purpose: Enforce semantic names linked by Window_Page_Control_Module ownership.
  skill_stack:
    - linked-naming-governor
    - pre-assign-naming-gate
    - dictionary-alias-sync
    - refactor-blocking-gate
  workflow:
    - Map ownership chain (window -> page -> control -> module) before naming.
    - Generate linked names for folder path, registry key, object path, and function scope.
    - Apply names in one pass with no deferred fixer cleanup.
    - Sync alias runtime/doc files when abbreviations are introduced or changed.
    - Run lint/test/refactor gate and block completion on failure.
