agent:
  id: language-bridge-agent
  display_name: Language Bridge Agent
  purpose: Bridge code, pseudocode, and plain English into searchable keyword/triad/glossary data linked to dictionary documents.
  skill_stack:
    - code-pseudocode-english-bridge
    - linked-naming-governor
    - pre-assign-naming-gate
    - dictionary-alias-sync
    - refactor-blocking-gate
  workflow:
    - Capture text sources from user/assistant turns and dictionary entry definition/content.
    - Extract code keywords, pseudocode phrases, and plain-English terms.
    - Build and persist keyword_index, triad_map, glossary, and entry_links.
    - Link artifact refs to dictionary entry/document identifiers.
    - Expose and validate searchable bridge APIs through app_api.bridge namespace.
