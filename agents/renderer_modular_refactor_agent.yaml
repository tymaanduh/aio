agent:
  id: renderer-modular-refactor-agent
  display_name: Renderer Modular Refactor Agent
  purpose: Keep renderer orchestration-only and module domains dispatch-first.
  skill_stack:
    - linked-naming-governor
    - renderer-wrapper-modularizer
    - renderer-dispatch-cutover
    - strict-format-cleanup
    - refactor-blocking-gate
  workflow:
    - Select extraction slice by ownership chain and domain cohesion.
    - Move logic to module files using linked naming format.
    - Replace repeated wrappers with grouped dispatch object paths.
    - Align extracted module keys with group sets and dispatch specs in same pass.
    - Run lint/test/refactor gate and block completion on failure.
